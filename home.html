<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plant Haven — Shop rare and beautiful indoor plants with expert care guidance.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2b2d42">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Plant Haven | Your Online Plant Paradise">
  <meta property="og:description" content="Shop rare and beautiful indoor plants with expert care guidance. Free shipping over $75.">
  <meta property="og:image" content="/assets/chinesevergreen.webp">
  <meta property="og:url" content="https://planthaven.netlify.app/home.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Plant Haven">
  <meta name="twitter:description" content="Shop rare and beautiful indoor plants with expert care guidance.">
  <meta name="twitter:image" content="/assets/chinesevergreen.webp">
  <title>Plant Haven | Your Online Plant Paradise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/home.css">
  <!-- Apply theme before render to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- JSON-LD structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "Plant Haven",
    "description": "Shop rare and beautiful indoor plants with expert care guidance.",
    "url": "https://planthaven.netlify.app",
    "sameAs": [],
    "offers": {
      "@type": "AggregateOffer",
      "priceCurrency": "USD",
      "offerCount": "4"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://planthaven.netlify.app/home.html?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="./home.html" class="logo">🪴 Plant Haven</a>
      <div class="nav-links">
        <button class="icon-btn" id="darkModeToggle" aria-label="Switch to dark mode">🌙</button>
        <a href="./quiz.html" class="nav-quiz-link">🌿 Find My Plant</a>
        <button class="nav-cart-btn" id="cartNavBtn" aria-label="Open cart">Cart (0)</button>
      </div>
    </div>
  </nav>

  <div class="filters glass-effect">
    <input type="text" class="filter-input" id="nameFilter" placeholder="Search by name">
    <select class="filter-input" id="regionFilter">
      <option value="">All Regions</option>
      <option value="tropical">Tropical</option>
      <option value="mediterranean">Mediterranean</option>
      <option value="temperate">Temperate</option>
    </select>
    <select class="filter-input" id="categoryFilter">
      <option value="">All Categories</option>
      <option value="indoor">Indoor</option>
      <option value="outdoor">Outdoor</option>
      <option value="rare">Rare Finds</option>
    </select>
    <select class="filter-input" id="difficultyFilter">
      <option value="">All Difficulty Levels</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="filter-chips" id="filterChips"></div>

  <div class="plants-grid" id="plantsContainer">
    <!-- Plants will be dynamically inserted here -->
  </div>

  <section id="recentlyViewedSection" class="recently-viewed" style="display:none"></section>

  <!-- ─── Plant Detail Modal ──────────────────────────────────────────────── -->
  <div class="modal-overlay" id="plantModal" role="dialog" aria-modal="true" aria-label="Plant details">
    <div class="modal-panel glass-effect">
      <button class="modal-close" onclick="closeModal()" aria-label="Close modal">&times;</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- ─── Cart Drawer ─────────────────────────────────────────────────────── -->
  <div class="drawer-overlay" id="cartDrawerOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="drawer-header">
      <h2>Your Cart</h2>
      <button class="drawer-close" onclick="closeCartDrawer()" aria-label="Close cart">&times;</button>
    </div>
    <div class="drawer-items" id="drawerItems"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./javascript/supabase-config.js"></script>
  <script src="./javascript/home.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
