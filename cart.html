<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Plant Haven shopping cart.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2b2d42">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Cart | Plant Haven">
  <meta property="og:description" content="Review your Plant Haven cart and proceed to checkout.">
  <meta property="og:url" content="https://planthaven.netlify.app/cart.html">
  <title>Cart | Plant Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/home.css">
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="./home.html" class="logo"><img src="./assets/planthavenlogo.png" alt="" class="logo-img"> Plant Haven</a>
      <div class="nav-links">
        <button class="icon-btn" id="darkModeToggle" aria-label="Switch to dark mode">🌙</button>
        <a href="./home.html">← Continue Shopping</a>
      </div>
    </div>
  </nav>

  <div class="cart-page">
    <div class="cart-main">
      <h1>Your Cart</h1>
      <div id="cartItems"></div>
    </div>
    <aside class="cart-summary glass-effect">
      <h2>Order Summary</h2>
      <div id="cartTotal"></div>
      <button id="checkoutButton" class="buy-button" style="display:none;">Proceed to Checkout</button>
      <a href="./home.html" class="back-link">← Continue Shopping</a>
    </aside>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('darkModeToggle');
        if (!btn) return;
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', function() {
          var cur = document.documentElement.getAttribute('data-theme');
          var next = cur === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☀️' : '🌙';
          btn.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        });
      });
    })();
  </script>
  <script src="./javascript/cart.js"></script>
</body>
</html>
