<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Order confirmed — thank you for shopping with Plant Haven.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2b2d42">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Order Confirmed | Plant Haven">
  <meta property="og:description" content="Your Plant Haven order is confirmed. Thank you for your purchase!">
  <meta property="og:url" content="https://planthaven.netlify.app/success.html">
  <title>Order Confirmed | Plant Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/home.css">
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .success-container { max-width: 560px; margin: 4rem auto; padding: 0 1.5rem; text-align: center; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-container h1 { color: var(--primary); margin-bottom: 0.5rem; }
    .success-meta { color: var(--text-secondary, #6c757d); margin-bottom: 2rem; font-size: 0.95rem; }
    .order-summary-card {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border, #e9ecef);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .order-summary-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
    .order-line { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.95rem; color: var(--text); border-bottom: 1px solid var(--border, #e9ecef); }
    .order-line:last-of-type { border-bottom: none; }
    .order-total-row { display: flex; justify-content: space-between; font-weight: 700; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 2px solid var(--primary); color: var(--primary); }
    .order-id-badge { display: inline-block; background: var(--primary); color: #fff; border-radius: 6px; padding: 0.2rem 0.7rem; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .success-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
    .skeleton-line { height: 1rem; background: var(--border, #e9ecef); border-radius: 4px; margin: 0.5rem 0; animation: shimmer 1.4s infinite linear; background: linear-gradient(90deg,rgba(200,200,200,.3) 25%,rgba(200,200,200,.6) 50%,rgba(200,200,200,.3) 75%); background-size: 200% 100%; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="./home.html" class="logo">🪴 Plant Haven</a>
      <div class="nav-links">
        <button class="icon-btn" id="darkModeToggle" aria-label="Switch to dark mode">🌙</button>
        <a href="./home.html">Shop</a>
        <a href="./orders.html">My Orders</a>
      </div>
    </div>
  </nav>

  <div class="success-container">
    <div class="success-icon">🪴</div>
    <h1>Order Confirmed!</h1>
    <p class="success-meta" id="successMeta">Thank you for your purchase. Your plants are on their way!</p>

    <div class="order-summary-card" id="orderSummary">
      <div class="skeleton-line" style="width:40%;height:0.75rem;margin-bottom:1rem"></div>
      <div class="skeleton-line" style="width:100%"></div>
      <div class="skeleton-line" style="width:100%"></div>
      <div class="skeleton-line" style="width:60%;margin-top:0.75rem"></div>
    </div>

    <div class="success-actions">
      <a href="./orders.html" class="buy-button">View My Orders</a>
      <a href="./home.html" class="buy-button secondary outline">Continue Shopping</a>
    </div>
  </div>

  <script>
    // ─── Dark mode ────────────────────────────────────────────────────────────
    const toggle = document.getElementById('darkModeToggle');
    function applyDarkMode(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    applyDarkMode(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    toggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyDarkMode(next);
    });

    // ─── Clear cart ───────────────────────────────────────────────────────────
    localStorage.removeItem('cart');

    // ─── Load order summary ───────────────────────────────────────────────────
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const summaryEl = document.getElementById('orderSummary');
      const metaEl = document.getElementById('successMeta');

      if (!sessionId) {
        summaryEl.innerHTML = '<p style="color:var(--text-secondary,#6c757d);font-size:0.9rem">No order details available.</p>';
        return;
      }

      try {
        const res = await fetch(`/.netlify/functions/get-order?session_id=${encodeURIComponent(sessionId)}`);
        if (!res.ok) throw new Error('fetch failed');
        const order = await res.json();

        if (order.customerName) {
          metaEl.textContent = `Thanks, ${order.customerName}! Your plants are on their way.`;
        }
        if (order.customerEmail) {
          metaEl.textContent += ` A receipt was sent to ${order.customerEmail}.`;
        }

        const itemRows = order.items.map(item => `
          <div class="order-line">
            <span>${item.name}${item.quantity > 1 ? ` &times; ${item.quantity}` : ''}</span>
            <span>$${(item.amount / 100).toFixed(2)}</span>
          </div>
        `).join('');

        summaryEl.innerHTML = `
          <span class="order-id-badge">Order #${order.orderId}</span>
          <h2>Order Summary</h2>
          ${itemRows}
          <div class="order-total-row">
            <span>Total</span>
            <span>$${(order.total / 100).toFixed(2)}</span>
          </div>
        `;
      } catch {
        summaryEl.innerHTML = '<p style="color:var(--text-secondary,#6c757d);font-size:0.9rem">Order details will appear in your order history shortly.</p>';
      }
    })();
  </script>
</body>
</html>
